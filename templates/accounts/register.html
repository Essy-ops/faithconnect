<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaithConnect - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #111827;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #1e2d4a;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #f0c040; font-size: 28px; }
        .logo p { color: #8899aa; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #c0d0e0; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #1e2d4a;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #0d1526;
            color: #e0eaf5;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #f0c040; }
        input::placeholder { color: #445566; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #f0c040;
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #d4a820; }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #8899aa;
            font-size: 14px;
        }
        .login-link a { color: #f0c040; font-weight: bold; text-decoration: none; }
        .error {
            background: #2a1010;
            color: #ff6b6b;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #4a1515;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>✝ FaithConnect</h1>
            <p>Create your account</p>
        </div>
        {% if messages %}
            {% for message in messages %}
            <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="/login/">Login here</a>
        </div>
    </div>
</body>
</html>
